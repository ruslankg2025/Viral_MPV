services:
  processor:
    build:
      context: .
      dockerfile: Modules/processor/Dockerfile
    image: viral-mpv/processor:dev
    container_name: viral-mpv-processor
    restart: unless-stopped
    env_file:
      - .env.processor
    environment:
      MEDIA_DIR: /media
      DB_DIR: /db
    volumes:
      - ./data/media:/media
      # SQLite WAL несовместим с Windows bind-mount — используем именованный volume
      - processor_db:/db
    ports:
      - "8100:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  script:
    build:
      context: .
      dockerfile: Modules/script/Dockerfile
    image: viral-mpv/script:dev
    container_name: viral-mpv-script
    restart: unless-stopped
    env_file:
      - .env.script
    environment:
      DB_DIR: /db
    volumes:
      # SQLite WAL несовместим с Windows bind-mount — используем именованный volume
      - script_db:/db
    ports:
      - "8200:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/script/healthz').status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  profile:
    build:
      context: .
      dockerfile: Modules/profile/Dockerfile
    image: viral-mpv/profile:dev
    container_name: viral-mpv-profile
    restart: unless-stopped
    env_file:
      - .env.profile
    environment:
      DB_DIR: /db
    volumes:
      - profile_db:/db
    ports:
      - "8300:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/profile/healthz').status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  shell:
    build:
      context: .
      dockerfile: Modules/shell/Dockerfile
    image: viral-mpv/shell:dev
    container_name: viral-mpv-shell
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - processor
      - profile
      - script
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  processor_db:
  script_db:
  profile_db:
