# nginx vhost для vira.roxber.com
# Ставится в /etc/nginx/sites-available/vira.roxber.com, симлинк в sites-enabled,
# сертификат certbot-ом через install-nginx.sh.

server {
    listen 80;
    listen [::]:80;
    server_name vira.roxber.com;

    # ACME-challenge (certbot webroot/standalone) — пропускаем без редиректа
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Всё остальное — в HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vira.roxber.com;

    # Сертификат подставит certbot, строки появятся автоматически:
    # ssl_certificate /etc/letsencrypt/live/vira.roxber.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/vira.roxber.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Логи
    access_log /var/log/nginx/vira.roxber.com.access.log;
    error_log  /var/log/nginx/vira.roxber.com.error.log;

    # Размер тел запросов — запас на загрузку миниатюр в будущем
    client_max_body_size 25M;

    # /api/* — прозрачно в shell (gateway сам прокидывает в profile/monitor).
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # Канонизация старых ссылок /app/* → /
    location = /app  { return 301 /; }
    location = /app/ { return 301 /; }
    location /app/ {
        # /app/foo → /foo
        rewrite ^/app/(.*)$ /$1 permanent;
    }

    # Корень + статика — переписываем в /app/<path> внутри shell
    # (shell держит Consumer UI на /app/ из-за того что admin UI на /).
    # Для браузера URL остаётся без префикса.
    location / {
        rewrite ^/(.*)$ /app/$1 break;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
