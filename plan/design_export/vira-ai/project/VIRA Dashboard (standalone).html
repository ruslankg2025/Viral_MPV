  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

padding-top:22px;margin-bottom:6px}\n  .nav{\n    display:flex;align-items:center;gap:18px;\n    background:color-mix(in oklab, var(--bg1) 82%, transparent);\n    backdrop-filter:blur(14px) saturate(140%);\n    -webkit-backdrop-filter:blur(14px) saturate(140%);\n    border:1px solid var(--br2);\n    border-radius:100px;\n    padding:6px 8px 6px 18px;\n    box-shadow:0 18px 60px -20px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.02) inset;\n  }\n  .logo{display:flex;align-items:center;gap:9px;padding-right:14px;border-right:1px solid var(--br2);cursor:pointer;user-select:none}\n  .logo:hover .lt{color:var(--teal-hi)}\n  .logo svg{flex-shrink:0}\n  .lt{font-size:13px;font-weight:600;color:var(--t1);line-height:1;letter-spacing:-.01em}\n  .ls{font-family:var(--mono);font-size:8.5px;color:var(--teal);letter-spacing:.14em;text-transform:uppercase;line-height:1;margin-top:3px}\n  .nav-links{display:flex;align-items:center;gap:2px}\n  .nl{padding:8px 14px;font-size:13px;color:var(--t2);cursor:pointer;border:none;background:transparent;transition:all .18s;white-space:nowrap;border-radius:999px;font-weight:500;letter-spacing:-.005em}\n  .nl:hover{color:var(--t1)}\n  .nl.on{color:var(--t1);background:var(--bg3)}\n  .nav-r{display:flex;align-items:center;gap:8px;padding-left:14px;border-left:1px solid var(--br2)}\n  .lang{font-family:var(--mono);font-size:10.5px;color:var(--t3);cursor:pointer;padding:4px 6px;letter-spacing:.06em}\n  .lang:hover{color:var(--t2)}\n  .gear{width:28px;height:28px;border:none;border-radius:50%;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);transition:color .15s}\n  .gear:hover{color:var(--t1);background:var(--bg3)}\n  .av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--teal),#0c6b82);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;cursor:pointer;border:1px solid color-mix(in oklab,var(--teal) 40%,transparent done'?'sd':'sp'}\">${r.st==='done'?'Готово':'В обработке'}<\u002Fspan>\n        <div class=\"scthbot\"><div class=\"schk\">${r.hk}<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"scb\">\n        <div class=\"sch\"><span class=\"schh\">${r.h}<\u002Fspan><span class=\"schn\">${r.n}<\u002Fspan><\u002Fdiv>\n        <div class=\"scbtns\"><button class=\"scbtn\">Копировать<\u002Fbutton><button class=\"scbtn\">Экспорт .md<\u002Fbutton><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`).join('') : `<div style=\"padding:80px;text-align:center;color:var(--t3);font-size:13px;grid-column:1/-1;font-family:var(--mono);letter-spacing:.05em\">— пока нет материалов —<\u002Fdiv>`;\n}\nfunction setN(el,n){ curN=n; renderPills(); rT(); }\nfunction setSeg(el){ document.querySelectorAll('.sb').forEach(b=>b.classList.remove('on')); el.classList.add('on'); }\nfunction setSrt(el){ document.querySelectorAll('.srt').forEach(t=>t.classList.remove('on')); el.classList.add('on'); }\nfunction setSN(el){ document.querySelectorAll('.sn').forEach(t=>t.classList.remove('on')); el.classList.add('on'); }\nfunction setTR(el){ document.querySelectorAll('.tr').forEach(t=>t.classList.remove('on')); el.classList.add('on'); }\nfunction setStb(el,v){ document.querySelectorAll('.stb').forEach(t=>t.classList.remove('on')); el.classList.add('on'); curSt=v; rS(); }\nfunction setT(el){ document.querySelectorAll('.tb').forEach(t=>t.classList.remove('on')); el.classList.add('on'); }\nfunction doSave(b){ const old=b.textContent; b.textContent='Сохранено ✓'; b.style.background='#14532d'; setTimeout(()=>{b.textContent=old; b.style.background=''},1800); }\n\nconst msgs=[];\nfunction chip(t){ document.getElementById('ainp').value=t; asend(); }\nfunction akey(e){ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); asend(); } }\nfunction asend(){\n  const inp=document.getElementById('ainp'), t=inp.value.trim(); if(!t) return;\n  msgs.push({r:'user',t}); inp.value=''; renderChat();\n  setTimeout(()=>{\n    const reps={\n      'найди вирусные':'Вот 5 идей на эту неделю:\\n\\n1. **Деньги** — «Я покажу свой портфель. 2М. Что там»\\n2. **Дети** — «Дочь спросила зачем я работаю, если деньги есть»\\n3. **Отношения** — «10 лет вместе и никогда не обсуждали деньги»\\n4. **Саморазвитие** — «3 решения, которые удвоили капитал»\\n5. **Бренд** — «15 лет в инвестициях и ни одной Hermès»',\n      'default':'Анализирую данные мониторинга 58 аккаунтов…\\n\\nТоп-паттерн недели: **личное разоблачение** (+34%)\\nОптимальная длина: **43–52 секунды**\\nЛучшее время: **19:30–21:00 UTC+5**\\n\\nЧто разобрать подробнее?'\n    };\n    const k=Object.keys(reps).find(k=>t.toLowerCase().includes(k))||'default';\n    msgs.push({r:'ai',t:reps[k]}); renderChat();\n  },700);\n}\nfunction renderChat(){\n  const c=document.getElementById('achat'), e=document.getElementById('achem');\n  if(e) e.style.display='none';\n  c.querySelectorAll('.msg').forEach(m=>m.remove());\n  msgs.forEach(m=>{\n    const d=document.createElement('div'); d.className='msg';\n    d.style.cssText=`display:flex;justify-content:${m.r==='user'?'flex-end':'flex-start'};margin-bottom:12px`;\n    d.innerHTML=`<div style=\"max-width:72%;padding:11px 15px;border-radius:${m.r==='user'?'16px 16px 4px 16px':'16px 16px 16px 4px'};background:${m.r==='user'?'var(--teal)':'var(--bg2)'};border:${m.r==='user'?'none':'1px solid var(--br)'};font-size:13px;color:${m.r==='user'?'#fff':'var(--t1)'};line-height:1.6;white-space:pre-wrap\">${m.t.replace(/\\*\\*(.*?)\\*\\*/g,'<strong>$1<\u002Fstrong>')}<\u002Fdiv>`;\n    c.appendChild(d);\n  });\n  c.scrollTop=c.scrollHeight;\n}\n\n/* ── Tweaks ── */\nfunction buildTweakSwatches(){\n  document.getElementById('tw-swatches').innerHTML = ACCENTS.map(a=>\n    `<div class=\"tw-sw\" data-v=\"${a.v}\" style=\"background:${a.v}\" onclick=\"saveKey('accent','${a.v}')\"><\u002Fdiv>`\n  ).join('');\n  ['tw-density','tw-thumbs','tw-badges'].forEach(id=>{\n    const key = id.replace('tw-','');\n    document.querySelectorAll('#'+id+' button').forEach(b=>{\n      b.onclick = ()=>saveKey(key, b.dataset.v);\n    });\n  });\n}\nfunction openTweaks(){ document.getElementById('tweaks').classList.add('on'); }\nfunction closeTweaks(){ document.getElementById('tweaks').classList.remove('on'); }\n\nwindow.addEventListener('message', (ev)=>{\n  const d=ev.data||{};\n  if(d.type==='__activate_edit_mode') openTweaks();\n  else if(d.type==='__deactivate_edit_mode') closeTweaks();\n});\ntry{ window.parent.postMessage({type:'__edit_mode_available'}, '*'); }catch(e){}\n\nrenderPills();\nbuildTweakSwatches();\nrenderNicheGrid();\ndocument.addEventListener('click', ()=>{ document.getElementById('ndd')?.classList.remove('on'); });\n\nfunction renderNicheGrid(){\n  const el = document.getElementById('ngrid'); if(!el) return;\n  const full = selectedNiches.length >= NICHE_MAX;\n  const typeLabel = {mass:'массовый', expert:'экспертный', both:'оба'};\n  el.innerHTML = NICHE_CATALOG.map(x=>{\n    const on = selectedNiches.includes(x.en);\n    const disabled = !on && full;\n    return `<div class=\"nitem ${on?'on':''} ${disabled?'disabled':''}\" onclick=\"toggleNiche('${x.en}')\">\n      <div class=\"nitem-tp\">${typeLabel[x.type]||''}<\u002Fdiv>\n      <div class=\"nitem-en\">${x.en}<\u002Fdiv>\n      <div class=\"nitem-ru\">${x.ru}<\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n  const lim = document.getElementById('nlimit');\n  if(lim){ lim.textContent = selectedNiches.length+' / '+NICHE_MAX; lim.classList.toggle('full', full); }\n}\nfunction toggleNiche(en){\n  const i = selectedNiches.indexOf(en);\n  if(i>=0){\n    selectedNiches.splice(i,1);\n    if(curN===en) curN='Все';\n  } else {\n    if(selectedNiches.length >= NICHE_MAX) return;\n    selectedNiches.push(en);\n  }\n  renderNicheGrid();\n  renderPills();\n  rT();\n}\n\n/* ===== AUTHORS ===== */\nconst AUTHOR_COLORS = ['#168FAA','#B5895A','#7B5CD6','#E25A5A','#4FAF7C','#d4a373','#8a7cc8','#c4746a'];\nlet authors = [\n  {h:'@mitroshina',   n:'Деньги',        fol:'284K', avg:'1.2M', trend:'hot',  delta:'+34%'},\n  {h:'@world_thoughts',n:'Отношения',      fol:'512K', avg:'890K', trend:'hot',  delta:'+28%'},\n  {h:'@lengold',     n:'Саморазвитие',  fol:'198K', avg:'720K', trend:'warm', delta:'+12%'},\n  {h:'@nikita.demin',n:'Дети',          fol:'156K', avg:'540K', trend:'hot',  delta:'+41%'},\n  {h:'@stellare',    n:'Бренд',          fol:'89K',  avg:'420K', trend:'warm', delta:'+8%'},\n  {h:'@schweta',     n:'Саморазвитие',  fol:'342K', avg:'380K', trend:'cold', delta:'-4%'},\n  {h:'@demin_dad',   n:'Дети',          fol:'67K',  avg:'290K', trend:'warm', delta:'+15%'},\n  {h:'@ann.ryasik',  n:'Отношения',      fol:'121K', avg:'310K', trend:'cold', delta:'−0%'},\n];\nconst MAX_AUTHORS = 10;\nfunction authorInitial(h){ return h.replace('@','').slice(0,2).toUpperCase(); }\nfunction authorColor(h){ let s=0; for(let i=0;i<h.length;i++) s=(s*31+h.charCodeAt(i))>>>0; return AUTHOR_COLORS[s%AUTHOR_COLORS.length]; }\nfunction renderAuthorsStrip(){\n  const el = document.getElementById('fbq-avs'); if(!el) return;\n  el.innerHTML = authors.slice(0,4).map(a=>`<span class=\"fbq-av\" style=\"background:${authorColor(a.h)}\">${authorInitial(a.h)}<\u002Fspan>`).join('');\n}\nfunction renderAuthors(){\n  const list = document.getElementById('auth-list');\n  if(!list) return;\n  list.innerHTML = authors.length ? authors.map((a,i)=>`\n    <div class=\"auth-row\">\n      <div class=\"auth-av\" style=\"background:${authorColor(a.h)}\">${authorInitial(a.h)}<\u002Fdiv>\n      <div class=\"auth-info\">\n        <div class=\"auth-h\">${a.h}<span class=\"auth-ni\">${a.n}<\u002Fspan><\u002Fdiv>\n        <div class=\"auth-s\"><span>${a.fol} подп.<\u002Fspan><span class=\"dot\"><\u002Fspan><span>ср.просм. ${a.avg}<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <span class=\"auth-trend ${a.trend}\">${a.delta}<\u002Fspan>\n      <button class=\"auth-x\" onclick=\"removeAuthor(${i})\" title=\"Удалить\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><line x1=\"2.5\" y1=\"2.5\" x2=\"9.5\" y2=\"9.5\"/><line x1=\"9.5\" y1=\"2.5\" x2=\"2.5\" y2=\"9.5\"/><\u002Fsvg><\u002Fbutton>\n    <\u002Fdiv>`).join('') : `<div class=\"auth-empty\">— список пуст —<\u002Fdiv>`;\n  document.getElementById('a-used').textContent = authors.length;\n  const left = Math.max(0, MAX_AUTHORS - authors.length);\n  document.getElementById('a-slots').textContent = left>0 ? `ещё ${left} слот${left===1?'':(left<5?'а':'ов')} свободно` : 'лимит исчерпан';\n  document.getElementById('a-bar').style.width = Math.min(100,(authors.length/MAX_AUTHORS)*100)+'%';\n  renderAuthorsStrip();\n}\nfunction openAuthors(focus){\n  document.getElementById('authors-modal').classList.add('on');\n  renderAuthors();\n  if(focus){ setTimeout(()=>document.getElementById('auth-inp').focus(),40); }\n}\nfunction closeAuthors(){ document.getElementById('authors-modal').classList.remove('on'); }\nfunction addAuthor(){\n  const inp = document.getElementById('auth-inp');\n  let v = inp.value.trim(); if(!v) return;\n  if(authors.length>=MAX_AUTHORS){ inp.style.borderColor='#f87171'; setTimeout(()=>inp.style.borderColor='',1200); return; }\n  let h = v.includes('/') ? '@'+v.split('/').filter(Boolean).pop().replace(/[^\\w.]/g,'') : (v.startsWith('@')?v:'@'+v);\n  if(authors.find(a=>a.h.toLowerCase()===h.toLowerCase())){ inp.style.borderColor='#f87171'; setTimeout(()=>inp.style.borderColor='',1200); return; }\n  authors.unshift({h, n:'Новый', fol:'—', avg:'—', trend:'warm', delta:'new'});\n  inp.value='';\n  renderAuthors();\n}\nfunction removeAuthor(i){ authors.splice(i,1); renderAuthors(); }\nrenderAuthorsStrip();\nwindow.addEventListener('keydown',(e)=>{ if(e.key==='Escape') closeAuthors(); });\n\napplyState();\ngo('home');\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
